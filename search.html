<!DOCTYPE html>
<html>
<body>
  <script>
    async function run(payload, secrets) {
      const apiKey = secrets['TAVILY_API_KEY'];
      const query = payload.query;
      
      try {
        const bodyData = {
            api_key: apiKey,
            query: query,
            search_depth: payload.search_depth || "basic",
            include_answer: true
        };
        
        // ถ้า AI ต้องการหาข่าวใหม่ล่าสุด จะเปลี่ยนโหมดการค้นหา
        if (payload.days) {
            bodyData.topic = "news";
            bodyData.days = payload.days;
        }

        const response = await fetch('https://api.tavily.com/search', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(bodyData)
        });
        
        const data = await response.json();
        
        // จัดรูปแบบข้อมูลเพื่อให้ AI อ่านและสรุปได้ง่ายขึ้น
        let resultString = "Search Answer: " + (data.answer || "No direct answer found.") + "\n\nSources:\n";
        if (data.results && data.results.length > 0) {
            data.results.forEach(r => {
                // ส่งทั้งหัวข้อ, URL และเนื้อหาไปให้ AI
                resultString += `- ${r.title} (${r.url})\n  Content: ${r.content.substring(0, 250)}...\n`;
            });
        } else {
            resultString += "No sources found.";
        }
        return resultString;
        
      } catch (error) {
        return "Error searching the web: " + error.message;
      }
    }
  </script>
</body>
</html>
