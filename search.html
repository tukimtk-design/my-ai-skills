<!DOCTYPE html>
<html>
<body>
  <script>
    // ฟังก์ชันนี้จะถูกเรียกโดยแอป Google AI Edge Gallery
    async function run(payload, secrets) {
      const apiKey = secrets['TAVILY_API_KEY']; // ชื่อ Secret ที่คุณต้องตั้งในแอป
      const query = payload.query;
      
      try {
        const response = await fetch('https://api.tavily.com/search', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            api_key: apiKey,
            query: query,
            search_depth: payload.search_depth || "basic",
            include_answer: true
          })
        });
        
        const data = await response.json();
        // ส่งข้อมูลกลับไปให้ AI สรุป
        return JSON.stringify(data.results); 
      } catch (error) {
        return "Error searching the web: " + error.message;
      }
    }
  </script>
</body>
</html>
