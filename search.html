<!DOCTYPE html>
<html>
<body>
  <script>
    async function run(payload) {
      const apiKey = "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";
      const query = payload.query || "Xiaomi 14T Pro";
      
      try {
        const response = await fetch('https://api.tavily.com/search', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ api_key: apiKey, query: query, include_answer: true })
        });

        if (!response.ok) {
           return "⚠️ API Error: ไม่สามารถเข้าถึง Tavily ได้ (รหัส " + response.status + ")";
        }

        const data = await response.json();
        return "✅ ผลการค้นหา: " + (data.answer || "ไม่พบคำตอบสรุป แต่พบลิงก์ข่าวจำนวนมาก");
        
      } catch (error) {
        return "⚠️ Network Error: มือถือบล็อกการเข้าอินเทอร์เน็ตของแอป (" + error.message + ")";
      }
    }
  </script>
</body>
</html>
