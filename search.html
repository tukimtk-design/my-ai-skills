<!DOCTYPE html>
<html>
<body>
  <script>
    async function run(payload) {
      try {
        // ดักจับกรณีแอปส่งข้อมูลมาผิดฟอร์แมต
        let obj = payload;
        if (typeof payload === 'string') {
            obj = JSON.parse(payload);
        }
        
        const query = obj.query || "Empty query";
        const apiKey = "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";
        
        const response = await fetch('https://api.tavily.com/search', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            api_key: apiKey,
            query: query,
            include_answer: true
          })
        });

        // ดักจับกรณี API Key มีปัญหา หรือ Server ปฏิเสธ
        if (!response.ok) {
           const errText = await response.text();
           return "[DEBUG-ERROR] HTTP " + response.status + " - " + errText;
        }

        const data = await response.json();
        return "[DEBUG-SUCCESS] เจอข้อมูลแล้ว: " + (data.answer || "No answer found");
        
      } catch (error) {
        // ดักจับกรณีมือถือหรือแอปบล็อกการออกเน็ต (CORS/Network error)
        return "[DEBUG-CATCH] " + error.name + " - " + error.message;
      }
    }
  </script>
</body>
</html>
