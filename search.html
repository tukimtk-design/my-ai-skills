<!DOCTYPE html>
<html>
<body>
  <script>
    async function run(payload, secrets) {
      // ฝัง API Key ลงไปตรงๆ เพื่อแก้ปัญหาปุ่ม Secret ไม่แสดง
      const apiKey = "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";
      const query = payload.query;
      
      try {
        const bodyData = {
            api_key: apiKey,
            query: query,
            search_depth: payload.search_depth || "basic",
            include_answer: true
        };
        
        if (payload.days) {
            bodyData.topic = "news";
            bodyData.days = payload.days;
        }

        const response = await fetch('https://api.tavily.com/search', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(bodyData)
        });
        
        // เพิ่มการเช็ค Error จาก Server ถ้าเชื่อมต่อไม่สำเร็จ
        if (!response.ok) {
            return "System Error: ไม่สามารถเชื่อมต่อกับ Tavily ได้ (Status " + response.status + ")";
        }

        const data = await response.json();
        
        let resultString = "Search Answer: " + (data.answer || "No direct answer found.") + "\n\nSources:\n";
        if (data.results && data.results.length > 0) {
            data.results.forEach(r => {
                resultString += `- ${r.title} (${r.url})\n  Content: ${r.content.substring(0, 250)}...\n`;
            });
        } else {
            resultString += "No sources found.";
        }
        return resultString;
        
      } catch (error) {
        return "System Error: " + error.message;
      }
    }
  </script>
</body>
</html>
